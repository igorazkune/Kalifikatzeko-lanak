<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azterketa — DBH2</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1a2e;--parchment:#f5f0e8;--parchment-dark:#ede5d0;--accent:#8b3a3a;--gold:#c9a84c;--correct:#2d6a4f;--wrong:#9b2226;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--ink);font-family:'Source Serif 4',Georgia,serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem 4rem;}
.page-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 20%,#2a1f3d 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,#1a2a1a 0%,transparent 60%),var(--ink);}
.wrapper{position:relative;z-index:1;width:100%;max-width:820px;}

.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;color:white;gap:1rem;}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.exam-header{background:var(--parchment);border-radius:4px 4px 0 0;padding:2rem 3rem 1.5rem;border-bottom:3px solid var(--gold);}
.school-name{font-family:'Playfair Display',serif;font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:.3rem;}
.exam-title{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--ink);margin-bottom:.2rem;}
.exam-subtitle{font-size:.88rem;color:#666;font-style:italic;}
.student-row{display:flex;gap:1.5rem;margin-top:1.2rem;flex-wrap:wrap;}
.student-field{flex:1;min-width:150px;display:flex;flex-direction:column;gap:.3rem;}
.student-field label{font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);font-weight:600;}
.student-field input,.student-field select{background:transparent;border:none;border-bottom:1.5px solid var(--accent);padding:.3rem 0;font-family:'Source Serif 4',serif;font-size:.95rem;color:var(--ink);outline:none;width:100%;cursor:pointer;}

.exam-body{background:var(--parchment);padding:2.5rem 3rem;}
.exercise{margin-bottom:2.5rem;padding-bottom:2.5rem;border-bottom:1px dashed #c5b99a;}
.exercise:last-child{border-bottom:none;margin-bottom:0;}
.ex-hdr{display:flex;align-items:baseline;gap:1rem;margin-bottom:1.2rem;}
.ex-num{font-family:'Playfair Display',serif;font-size:2rem;color:var(--accent);line-height:1;min-width:2rem;}
.ex-title{font-size:.9rem;font-weight:600;color:var(--ink);line-height:1.4;flex:1;}
.ex-pts{font-size:.75rem;background:var(--accent);color:white;padding:.2rem .6rem;border-radius:2px;white-space:nowrap;}

.map-img{width:100%;border-radius:4px;border:1px solid #c5b99a;margin-bottom:1.5rem;}

textarea.ans{width:100%;border:1px solid #c5b99a;background:rgba(255,255,255,.6);padding:.5rem .7rem;font-family:'Source Serif 4',serif;font-size:.88rem;color:var(--ink);resize:vertical;min-height:70px;border-radius:2px;outline:none;}
textarea.ans:focus{border-color:var(--accent);background:white;}

.multi-opts{display:flex;flex-direction:column;gap:.5rem;margin-top:.5rem;}
.multi-opt{display:flex;align-items:center;gap:.8rem;padding:.6rem .8rem;border:1.5px solid #c5b99a;border-radius:4px;cursor:pointer;background:rgba(255,255,255,.5);transition:all .2s;}
.multi-opt:hover{border-color:var(--accent);background:white;}
.multi-opt.selected{border-color:var(--accent);background:white;}
.opt-lbl{font-weight:600;color:var(--accent);min-width:1.5rem;}
.opt-txt{font-size:.88rem;color:var(--ink);}

.fill-table{width:100%;border-collapse:collapse;font-size:.85rem;margin-top:.8rem;}
.fill-table th{background:var(--ink);color:var(--gold);padding:.6rem .8rem;text-align:left;font-family:'Playfair Display',serif;font-size:.8rem;}
.fill-table td{border:1px solid #c5b99a;padding:.3rem;vertical-align:top;}
.fill-table .row-lbl{background:var(--accent);color:white;font-weight:600;padding:.5rem .8rem;font-size:.82rem;white-space:nowrap;}
.fill-table textarea{width:100%;border:none;background:transparent;padding:.3rem .4rem;font-family:'Source Serif 4',serif;font-size:.82rem;color:var(--ink);resize:vertical;min-height:50px;outline:none;}
.fill-table textarea:focus{background:rgba(255,255,255,.8);}

.exam-footer{background:var(--parchment-dark);border-top:3px solid var(--gold);padding:1.5rem 3rem;display:flex;align-items:center;justify-content:space-between;border-radius:0 0 4px 4px;flex-wrap:wrap;gap:1rem;}
.submit-btn{background:var(--accent);color:white;border:none;padding:.9rem 2.5rem;font-family:'Playfair Display',serif;font-size:1rem;cursor:pointer;border-radius:2px;transition:background .2s;}
.submit-btn:hover{background:#6d2b2b;}
.submit-btn:disabled{background:#999;cursor:not-allowed;}

.sent-panel{display:none;background:var(--parchment);border-top:3px solid var(--gold);padding:3rem;text-align:center;border-radius:0 0 4px 4px;}
.sent-panel.visible{display:block;}

@media(max-width:600px){.exam-header,.exam-body,.exam-footer{padding:1.5rem;}}
</style>
</head>
<body>
<div class="page-bg"></div>
<div class="wrapper">
  <div class="loading-screen" id="loading">
    <div class="spinner"></div>
    <div style="font-family:'Playfair Display',serif;font-size:1.1rem">Azterketa kargatzen...</div>
  </div>
  <div id="exam-content" style="display:none">
    <div class="exam-header">
      <div class="school-name">IES Miguel de Unamuno · Vitoria-Gasteiz · DBH2</div>
      <div class="exam-title" id="exam-title">Azterketa</div>
      <div class="exam-subtitle" id="exam-subtitle">Geografia eta Historia · 2025/26</div>
      <div class="student-row">
        <div class="student-field">
          <label>Izen-Abizenak *</label>
          <input type="text" id="s-name" placeholder="Zure izena...">
        </div>
        <div class="student-field">
          <label>Taldea *</label>
          <select id="s-group">
            <option value="">— Aukeratu —</option>
          </select>
        </div>
        <div class="student-field" style="flex:2;min-width:200px">
          <label>Email (aukerakoa)</label>
          <input type="email" id="s-email" placeholder="zure.email@gmail.com">
        </div>
      </div>
    </div>
    <div class="exam-body" id="exam-body"></div>
    <div class="exam-footer">
      <div style="font-size:.82rem;color:#666;font-style:italic" id="footer-info">Bete galdera guztiak bidali aurretik.</div>
      <button class="submit-btn" id="submit-btn" onclick="submitExam()">Bidali azterketa →</button>
    </div>
    <div class="sent-panel" id="sent-panel">
      <div style="font-size:3rem">✉️</div>
      <div style="font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--ink);margin:1rem 0 .5rem">Azterketa bidalia!</div>
      <div style="font-size:.9rem;color:#555;font-style:italic">Zure erantzunak jaso ditugu. Irakasleak zuzendu ondoren jakinaraziko zaizu.</div>
    </div>
  </div>
</div>
<script>
const APPS_URL = 'https://script.google.com/macros/s/AKfycbxi-AqWNXQ3MUOv_xwZzmDcgrE_js2ZPa3Eb0fAqXohurMSq0e1m0dSVfPY38sSf6sV9Q/exec';
const AZTERKETA = new URLSearchParams(window.location.search).get('a') || '';

let galderak = [];
let master_keys = {};
let puntuak = {};
let cheat = 0;
let submitted = false;

document.addEventListener('visibilitychange', () => { if (!submitted && document.hidden) cheat++; });
window.addEventListener('blur', () => { if (!submitted) cheat++; });

async function loadExam() {
  if (!AZTERKETA) {
    // Try to load list of azterketak
    try {
      const res = await fetch(APPS_URL + '?action=getAzterketak&t=' + Date.now());
      const list = await res.json();
      if (list.length > 0) {
        document.getElementById('loading').innerHTML = `
          <div style="text-align:center;color:white;padding:2rem">
            <div style="font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--gold);margin-bottom:1.5rem">Aukeratu azterketa:</div>
            ${list.map(a => `<a href="?a=${encodeURIComponent(a)}" style="display:block;background:rgba(255,255,255,.1);color:white;padding:.8rem 2rem;border-radius:4px;margin-bottom:.5rem;text-decoration:none;font-size:1rem;border:1px solid rgba(255,255,255,.2)">${a}</a>`).join('')}
          </div>`;
      } else {
        document.getElementById('loading').innerHTML = '<div style="color:#e63946;font-size:1rem;text-align:center">⚠️ Oraindik ez dago azterketarik sortuta.</div>';
      }
    } catch(e) {
      document.getElementById('loading').innerHTML = '<div style="color:#e63946;font-size:1rem;text-align:center">⚠️ Ezin da kargatu.</div>';
    }
    return;
  }
  try {
    const res = await fetch(`${APPS_URL}?action=getConfig&t=${Date.now()}`);
    const config = await res.json();

    document.getElementById('exam-title').textContent = config['tituloa_'+AZTERKETA] || AZTERKETA;
    document.getElementById('exam-subtitle').textContent = config['azpitituloa_'+AZTERKETA] || 'Geografia eta Historia · 2025/26';
    document.title = (config['tituloa_'+AZTERKETA] || AZTERKETA) + ' — DBH2';

    // Taldeak
    try {
      const t = config['taldeak_'+AZTERKETA];
      const taldeak = Array.isArray(t) ? t : JSON.parse(t || '["2.A","2.B","2.C"]');
      const sel = document.getElementById('s-group');
      taldeak.forEach(td => {
        const opt = document.createElement('option');
        opt.value = td; opt.textContent = td;
        sel.appendChild(opt);
      });
    } catch(e) {}

    // Galderak
    try {
      const g = config['galderak_'+AZTERKETA];
      galderak = Array.isArray(g) ? g : JSON.parse(g || '[]');
    } catch(e) {}
    try {
      const mk = config['master_keys_'+AZTERKETA];
      master_keys = typeof mk==='object' ? mk : JSON.parse(mk || '{}');
    } catch(e) {}
    try {
      const p = config['puntuak_'+AZTERKETA];
      puntuak = typeof p==='object' ? p : JSON.parse(p || '{}');
    } catch(e) {}

    // Irudia
    const irudia = config['irudia_url_'+AZTERKETA];
    if (irudia) {
      const img = document.createElement('img');
      img.src = irudia; img.className = 'map-img'; img.alt = 'Azterketa irudia';
      document.getElementById('exam-body').appendChild(img);
    }

    buildExam();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('exam-content').style.display = 'block';
  } catch(e) {
    document.getElementById('loading').innerHTML = '<div style="color:#e63946;font-size:1rem;text-align:center">⚠️ Ezin da azterketa kargatu. Saiatu berriro.</div>';
  }
}

function buildExam() {
  const body = document.getElementById('exam-body');
  galderak.forEach((q, idx) => {
    const pts = q.type==='table'
      ? (q.tableRows||[]).reduce((s,_,ri) => s + (parseFloat(puntuak[q.id+'_r'+ri])||1), 0)
      : parseFloat(puntuak[q.id])||1;

    const div = document.createElement('div');
    div.className = 'exercise';
    let inner = `
      <div class="ex-hdr">
        <div class="ex-num">${idx+1}</div>
        <div class="ex-title">${q.label}</div>
        <div class="ex-pts">${pts} puntu</div>
      </div>`;

    if (q.type === 'text') {
      inner += `<textarea class="ans" id="ans-${q.id}" placeholder="Idatzi erantzuna..."></textarea>`;
    }
    if (q.type === 'multi') {
      inner += '<div class="multi-opts">';
      ['A','B','C','D'].forEach((l, i) => {
        if (!q.options[i]) return;
        inner += `<label class="multi-opt" onclick="selOpt('${q.id}','${l}',this)">
          <input type="radio" name="r-${q.id}" value="${l}" style="display:none">
          <span class="opt-lbl">${l})</span>
          <span class="opt-txt">${q.options[i]}</span>
        </label>`;
      });
      inner += '</div>';
    }
    if (q.type === 'table') {
      const cols = (q.columns||'').split(',').map(s=>s.trim()).filter(Boolean);
      inner += '<table class="fill-table"><thead><tr><th>—</th>';
      cols.forEach(c => { inner += `<th>${c}</th>`; });
      inner += '</tr></thead><tbody>';
      (q.tableRows||[]).forEach((row, ri) => {
        inner += `<tr><td class="row-lbl">${row.label}</td>`;
        cols.forEach((_, ci) => {
          inner += `<td><textarea id="ans-${q.id}_r${ri}_c${ci}" placeholder="..."></textarea></td>`;
        });
        inner += '</tr>';
      });
      inner += '</tbody></table>';
    }

    div.innerHTML = inner;
    body.appendChild(div);
  });
}

function selOpt(qid, letter, el) {
  document.querySelectorAll(`[name="r-${qid}"]`).forEach(r => r.closest('.multi-opt').classList.remove('selected'));
  el.classList.add('selected');
  el.querySelector('input').checked = true;
}

function norm(str) {
  return (str||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
}

function gradeAns(mk, val) {
  if (!mk) return -1;
  const v = norm(val);
  if (!v) return 0;
  if (mk.exact) return norm(v) === norm(mk.exact) ? 1 : 0;
  if (mk.keywords && mk.keywords.length) {
    const m = mk.keywords.filter(k => v.includes(norm(k))).length;
    if (m >= (mk.min||1)) return 1;
    if (m > 0) return 0.5;
    return 0;
  }
  return -1;
}

async function submitExam() {
  const name = document.getElementById('s-name').value.trim();
  const group = document.getElementById('s-group').value;
  if (!name) { alert('Mesedez, idatzi zure izena.'); return; }
  if (!group) { alert('Mesedez, aukeratu taldea.'); return; }

  const erantzunak = {};
  const scores = {};
  let totalPts = 0, maxPts = 0;

  galderak.forEach(q => {
    if (q.type === 'text') {
      const val = (document.getElementById('ans-'+q.id)||{}).value || '';
      erantzunak[q.id] = val;
      const s = gradeAns(master_keys[q.id], val);
      scores[q.id] = s;
      const pts = parseFloat(puntuak[q.id])||1;
      if (s !== -1) { totalPts += (s||0)*pts; maxPts += pts; }
    }
    if (q.type === 'multi') {
      const checked = document.querySelector(`input[name="r-${q.id}"]:checked`);
      const val = checked ? checked.value : '';
      erantzunak[q.id] = val;
      const s = gradeAns(master_keys[q.id], val);
      scores[q.id] = s;
      const pts = parseFloat(puntuak[q.id])||1;
      if (s !== -1) { totalPts += (s||0)*pts; maxPts += pts; }
    }
    if (q.type === 'table') {
      const cols = (q.columns||'').split(',').map(s=>s.trim()).filter(Boolean);
      (q.tableRows||[]).forEach((_, ri) => {
        const fid = q.id+'_r'+ri;
        let combined = '';
        cols.forEach((_, ci) => { combined += ' ' + ((document.getElementById('ans-'+fid+'_c'+ci)||{}).value||''); });
        erantzunak[fid] = combined.trim();
        const s = gradeAns(master_keys[fid], combined);
        scores[fid] = s;
        const pts = parseFloat(puntuak[fid])||1;
        if (s !== -1) { totalPts += (s||0)*pts; maxPts += pts; }
      });
    }
  });

  const nota_auto = maxPts > 0 ? Math.round((totalPts/maxPts)*10*10)/10 : 0;

  const payload = {
    data: new Date().toLocaleString('eu-ES'),
    izena: name, taldea: group,
    email: document.getElementById('s-email').value.trim(),
    azterketa: AZTERKETA,
    galderak, erantzunak, scores, cheat, nota_auto
  };

  const btn = document.getElementById('submit-btn');
  btn.textContent = '⏳ Bidaltzen...'; btn.disabled = true;
  submitted = true;

  try {
    const res = await fetch(APPS_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await res.json().catch(() => ({ok: true}));

    if (data.ok === false && data.msg) {
      // Jadanik bidali du
      document.querySelector('.exam-footer').style.display = 'none';
      document.getElementById('sent-panel').classList.add('visible');
      document.getElementById('sent-panel').innerHTML = `
        <div style="font-size:3rem">⚠️</div>
        <div style="font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--wrong);margin:1rem 0 .5rem">Jadanik bidali duzu!</div>
        <div style="font-size:.9rem;color:#555;font-style:italic">Azterketa hau lehenago bidali duzu. Ezin duzu berriro bidali.</div>`;
    } else {
      document.querySelector('.exam-footer').style.display = 'none';
      document.getElementById('sent-panel').classList.add('visible');
    }
  } catch(e) {
    btn.textContent = '⚠️ Errorea — saiatu berriro';
    btn.disabled = false; submitted = false;
  }
}

loadExam();
</script>
</body>
</html>
